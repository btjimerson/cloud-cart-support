name: GHCR Probe

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create real package names from a branch context
        run: |
          set -e
          docker pull alpine:3.20 >/dev/null

          names=(
            "cloud-cart-support/cloud-cart-support-catalog"
            "cloud-cart-support/cloud-cart-support-customers"
            "cloud-cart-support/cloud-cart-support-notifications"
            "cloud-cart-support/cloud-cart-support-orders"
            "cloud-cart-support/cloud-cart-support-support"
            "cloud-cart-support/support-service"
          )
          for n in "${names[@]}"; do
            ref="ghcr.io/btjimerson/$n:bootstrap"
            docker tag alpine:3.20 "$ref"
            echo "creating $ref"
            docker push "$ref"
          done
          echo "All packages created."
