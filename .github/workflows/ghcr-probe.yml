name: GHCR Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make trivial Dockerfile
        run: printf 'FROM alpine:3.20\n' > probe.Dockerfile

      - name: A) build-push-action DEFAULT (provenance on)
        id: a
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: probe.Dockerfile
          push: true
          tags: ghcr.io/btjimerson/cloud-cart-support/probe-buildx-default:probe

      - name: B) build-push-action provenance=false sbom=false
        id: b
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: probe.Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/btjimerson/cloud-cart-support/probe-buildx-noprov:probe

      - name: C) EXACT repro - real name + :latest + source label
        id: c
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: probe.Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ghcr.io/btjimerson/cloud-cart-support/cloud-cart-support-support:probe
            ghcr.io/btjimerson/cloud-cart-support/cloud-cart-support-support:probe-latest

      - name: Summary
        run: |
          echo "===== BUILDX PROBE SUMMARY ====="
          echo "A) default (provenance on):     ${{ steps.a.outcome }}"
          echo "B) provenance=false sbom=false: ${{ steps.b.outcome }}"
          echo "C) exact repro (real name):     ${{ steps.c.outcome }}"
